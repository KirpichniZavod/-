<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Three.js Starter</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0b1020;
        color: #fff;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      }
      #ui {
        position: fixed;
        top: 12px;
        left: 12px;
        background: rgba(0,0,0,0.35);
        padding: 8px 10px;
        border-radius: 8px;
        line-height: 1.3;
        font-size: 13px;
        user-select: none;
        backdrop-filter: blur(4px);
      }
      a { color: #9fd1ff; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="ui">
      <div><strong>Three.js 3D Starter</strong></div>
      <div>ЛКМ — вращение, колесо — зум, ПКМ — панорамирование</div>
    </div>

    <script type="module">
      import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';
      import { OrbitControls } from 'https://unpkg.com/three@0.165.0/examples/jsm/controls/OrbitControls.js';

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b1020);

      const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
      camera.position.set(4, 3, 6);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      // Lights
      const hemiLight = new THREE.HemisphereLight(0xffffff, 0x223344, 0.6);
      scene.add(hemiLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(5, 8, 3);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      scene.add(dirLight);

      // Ground
      const groundGeo = new THREE.PlaneGeometry(100, 100);
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x131b34, roughness: 0.9, metalness: 0.0 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.5;
      ground.receiveShadow = true;
      scene.add(ground);

      // Grid helper
      const grid = new THREE.GridHelper(50, 50, 0x2f4b8f, 0x1b2a4b);
      grid.position.y = -0.499;
      scene.add(grid);

      // Spinning cube
      const cubeGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
      const cubeMat = new THREE.MeshStandardMaterial({ color: 0x4cc3ff, metalness: 0.2, roughness: 0.4 });
      const cube = new THREE.Mesh(cubeGeo, cubeMat);
      cube.position.y = 0.6;
      cube.castShadow = true;
      scene.add(cube);

      // Orbit controls
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0.4, 0);

      // Resize handling
      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
      window.addEventListener('resize', onWindowResize);

      // Animation loop
      const clock = new THREE.Clock();
      renderer.setAnimationLoop(() => {
        const t = clock.getElapsedTime();
        cube.rotation.x = t * 0.6;
        cube.rotation.y = t * 0.9;

        controls.update();
        renderer.render(scene, camera);
      });
    </script>
  </body>
</html>
